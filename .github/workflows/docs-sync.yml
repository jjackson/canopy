name: docs-sync

# CI gate: when a PR touches an engine source path with user-facing authoring
# implications (Action models, recorder primitives, record_video CLI flags,
# concept-eval rubric), the corresponding SKILL.md must be updated in the
# same PR. Opt-out via a `Docs-not-needed: <reason>` line in the PR body.
#
# Why: of the 14 canopy PRs shipped on 2026-06-01, only #108, #111, #113, and
# #115 explicitly touched SKILL.md when they should have. The drift cost a
# meta-audit PR (#115) and a follow-up (#116). This gate prevents the next
# drift cycle.

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  docs-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run docs-sync check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python .github/scripts/docs_sync_check.py
