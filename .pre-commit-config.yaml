# Pre-commit hooks for canopy.
#
# Install once per clone:  pre-commit install
# Run manually:             pre-commit run --all-files
#
# This config is intentionally minimal: we only run hooks that catch real
# drift problems we've hit in practice. Other formatters and linters can be
# added later — keep the bar high so `pre-commit install` stays cheap.

repos:
  - repo: local
    hooks:
      - id: regen-ddd-json-schemas
        # The Pydantic models are the source of truth: the generic narrative
        # models in scripts/narrative/models.py plus the DDD-only RunState in
        # scripts/ddd/schemas/models.py. The committed JSON schemas at
        # scripts/narrative/schema/json/*.json are downstream artifacts consumed
        # by scripts/ddd/validate.py and external (cross-repo) tools; they're
        # supposed to stay in lockstep.
        #
        # This hook fires when either models file is staged, regenerates the
        # JSON files via scripts/ddd/regen_json_schemas.py, and relies on
        # pre-commit's standard modify-then-fail behaviour: if the regenerated
        # output differs from what is committed, pre-commit blocks the commit
        # with "files were modified by this hook" and the developer runs
        # `git add scripts/narrative/schema/json/` before retrying.
        #
        # Motivation: DrawAction (added in #104) was missing from
        # UnifiedSpec.json for two days until someone re-ran the regen by
        # hand during #108. The existing
        # tests/ddd/test_validate.py::test_committed_json_schemas_match_generated
        # test catches this in CI; this hook catches it locally, before the
        # push, so other developers never pull stale schemas.
        name: Regenerate narrative JSON schemas from models.py
        entry: python scripts/ddd/regen_json_schemas.py
        language: python
        # Match pyproject.toml's `requires-python = ">=3.11"`. The DDD models
        # use 3.10+ union syntax (`str | None`); the hook fails on the
        # default 3.9 pre-commit uses on macOS.
        language_version: python3.11
        # additional_dependencies match the constraints in pyproject.toml so
        # the hook venv mirrors the project runtime. pyyaml is imported at
        # module load of scripts/ddd/validate.py (for validate(), not for
        # dump_json_schemas) so the hook needs it too.
        additional_dependencies:
          - "pydantic>=2.13.4"
          - "pyyaml>=6.0"
        files: ^scripts/(narrative/models|ddd/schemas/models)\.py$
        pass_filenames: false
