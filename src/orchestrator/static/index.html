<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canopy Orchestrator - Transcript Browser</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1117;
  --bg-header: #161b22;
  --bg-card: #161b22;
  --bg-hover: #1c2129;
  --bg-input: #0d1117;
  --border: #30363d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --error: #f85149;
  --success: #3fb950;
  --warning: #d29922;
  --purple: #bc8cff;
  --user-bg: #1c3a5f;
  --assistant-bg: #1a2332;
  --tool-bg: #1c2333;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

/* Header */
.header {
  background: var(--bg-header);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
}
.header h1 span { color: var(--accent); }
.header-stats {
  color: var(--text-muted);
  font-size: 13px;
  margin-left: auto;
}

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 8px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 49px;
  z-index: 99;
}
.filter-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* Main content */
.main { padding: 16px 24px; max-width: 1200px; margin: 0 auto; }

/* Repo group */
.repo-group { margin-bottom: 12px; }
.repo-header {
  background: var(--bg-header);
  border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  padding: 10px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
  transition: background 0.15s;
}
.repo-header:hover { background: var(--bg-hover); }
.repo-group.collapsed .repo-header { border-radius: 8px; }
.repo-group.collapsed .repo-sessions { display: none; }
.repo-chevron {
  transition: transform 0.15s;
  color: var(--text-muted);
  font-size: 12px;
  width: 16px;
  text-align: center;
}
.repo-group.collapsed .repo-chevron { transform: rotate(-90deg); }
.repo-name { font-weight: 600; font-size: 15px; }
.repo-name.unmapped { color: var(--text-muted); font-style: italic; }
.repo-meta {
  color: var(--text-muted);
  font-size: 12px;
  margin-left: auto;
  display: flex;
  gap: 12px;
  align-items: center;
}
.repo-meta .servers { display: flex; gap: 4px; flex-wrap: wrap; }
.server-pill {
  background: #1c2333;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1px 8px;
  font-size: 11px;
  color: var(--purple);
}

/* Session row */
.repo-sessions {
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
}
.session-row {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.1s;
}
.session-row:last-child { border-bottom: none; }
.session-row:hover { background: var(--bg-hover); }
.session-row.expanded { background: var(--bg-hover); border-bottom-color: var(--accent); }
.session-date {
  color: var(--text-muted);
  font-size: 12px;
  white-space: nowrap;
  min-width: 110px;
}
.session-msg {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
}
.session-badges { display: flex; gap: 6px; align-items: center; }
.badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  white-space: nowrap;
}
.badge-lines { background: #1c2333; color: var(--text-muted); }
.badge-user { background: #1a2332; color: var(--accent); }
.badge-mcp { background: #1f1d2e; color: var(--purple); }
.badge-quality {
  border: 1px solid;
  font-weight: 500;
}
.badge-went-well { border-color: var(--success); color: var(--success); }
.badge-had-friction { border-color: var(--warning); color: var(--warning); }
.badge-disaster { border-color: var(--error); color: var(--error); }
.badge-good-for-eval { border-color: var(--accent); color: var(--accent); }
.badge-skip-coding, .badge-skip-setup { border-color: var(--text-muted); color: var(--text-muted); }

/* Assign repo */
.assign-repo-row {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 6px 16px;
  border-bottom: 1px solid var(--border);
  background: #111820;
}
.assign-repo-row:last-child { border-bottom: none; }
.assign-repo-key {
  color: var(--text-muted);
  font-size: 12px;
  font-family: monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 300px;
}
.assign-repo-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--accent);
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  white-space: nowrap;
}
.assign-repo-btn:hover { background: var(--bg-hover); }
.assign-input {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 12px;
  width: 200px;
}
.assign-input:focus { border-color: var(--accent); outline: none; }

/* Detail panel */
.detail-panel {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 16px 16px 40px;
}
.detail-stats {
  display: flex;
  gap: 20px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.detail-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.detail-stat-value { font-size: 20px; font-weight: 600; color: var(--accent); }
.detail-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

.detail-servers {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.detail-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.action-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.action-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.action-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.action-btn.loading {
  color: var(--warning);
  border-color: var(--warning);
}

/* Label controls */
.label-controls {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 16px;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 8px 16px;
  align-items: center;
}
.label-controls label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.label-controls select,
.label-controls input[type="text"],
.label-controls textarea {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 8px;
  border-radius: 4px;
  font-size: 13px;
  font-family: inherit;
}
.label-controls select:focus,
.label-controls input:focus,
.label-controls textarea:focus { border-color: var(--accent); outline: none; }
.label-controls textarea { resize: vertical; min-height: 50px; }
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.tag-pills {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.tag-pill {
  background: #1c2333;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1px 8px;
  font-size: 11px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 4px;
}
.tag-pill .remove {
  cursor: pointer;
  color: var(--text-muted);
  font-size: 13px;
}
.tag-pill .remove:hover { color: var(--error); }

/* Result areas */
.result-area {
  margin-bottom: 16px;
}
.result-area h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Observation cards */
.obs-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  margin-bottom: 6px;
}
.obs-card-header {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 4px;
}
.obs-type {
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  font-weight: 600;
}
.obs-type-gap { background: #3b1d25; color: var(--error); }
.obs-type-friction { background: #3b2e1d; color: var(--warning); }
.obs-type-pattern { background: #1d2e3b; color: var(--accent); }
.obs-type-opportunity { background: #1d3b25; color: var(--success); }
.obs-severity { font-size: 11px; color: var(--text-muted); }
.obs-desc { font-size: 13px; }
.obs-servers { margin-top: 4px; }

/* Proposal cards */
.proposal-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  margin-bottom: 6px;
}
.proposal-header {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 6px;
}
.proposal-type {
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 4px;
  background: #1d2e3b;
  color: var(--accent);
  text-transform: uppercase;
  font-weight: 600;
}
.proposal-action { font-size: 13px; font-weight: 500; }
.proposal-detail { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }

/* Markdown review content */
.review-content {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  font-size: 13px;
  line-height: 1.7;
}
.review-content h1, .review-content h2, .review-content h3 {
  margin: 12px 0 6px;
  color: var(--text);
}
.review-content h1 { font-size: 18px; }
.review-content h2 { font-size: 16px; }
.review-content h3 { font-size: 14px; }
.review-content p { margin-bottom: 8px; }
.review-content ul, .review-content ol { padding-left: 20px; margin-bottom: 8px; }
.review-content code {
  background: #1c2333;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 12px;
}
.review-content pre {
  background: #1c2333;
  padding: 10px;
  border-radius: 6px;
  overflow-x: auto;
  margin-bottom: 8px;
}
.review-content pre code { background: none; padding: 0; }
.review-content blockquote {
  border-left: 3px solid var(--border);
  padding-left: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

/* Transcript viewer */
.transcript-viewer {
  max-height: 600px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  background: var(--bg);
}
.transcript-entry { margin-bottom: 10px; }
.msg-bubble {
  max-width: 85%;
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 13px;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.5;
}
.msg-user {
  background: var(--user-bg);
  border: 1px solid #254b78;
  margin-right: auto;
}
.msg-assistant {
  background: var(--assistant-bg);
  border: 1px solid #253040;
  margin-left: auto;
}
.msg-label {
  font-size: 10px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 3px;
  letter-spacing: 0.5px;
}
.msg-user-row { display: flex; justify-content: flex-start; }
.msg-assistant-row { display: flex; justify-content: flex-end; }
.tool-call-block {
  background: var(--tool-bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--purple);
  border-radius: 6px;
  padding: 8px 12px;
  margin-bottom: 6px;
  font-size: 12px;
}
.tool-call-name {
  font-weight: 600;
  color: var(--purple);
  margin-bottom: 4px;
  font-size: 13px;
}
.tool-call-input {
  font-family: monospace;
  font-size: 11px;
  color: var(--text-muted);
  white-space: pre-wrap;
  max-height: 150px;
  overflow-y: auto;
}
.tool-result-block {
  background: var(--tool-bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--success);
  border-radius: 6px;
  margin-bottom: 6px;
  font-size: 12px;
}
.tool-result-toggle {
  padding: 6px 12px;
  cursor: pointer;
  color: var(--text-muted);
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tool-result-toggle:hover { color: var(--text); }
.tool-result-content {
  display: none;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  font-family: monospace;
  font-size: 11px;
  white-space: pre-wrap;
  max-height: 300px;
  overflow-y: auto;
  color: var(--text-muted);
}
.tool-result-block.open .tool-result-content { display: block; }

.thinking-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 6px;
  font-size: 12px;
}
.thinking-toggle {
  padding: 6px 12px;
  cursor: pointer;
  color: var(--text-muted);
  font-style: italic;
  user-select: none;
}
.thinking-toggle:hover { color: var(--text); }
.thinking-content {
  display: none;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  white-space: pre-wrap;
  color: var(--text-muted);
  max-height: 200px;
  overflow-y: auto;
}
.thinking-block.open .thinking-content { display: block; }

/* Spinner */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Loading overlay */
.loading-msg {
  padding: 40px;
  text-align: center;
  color: var(--text-muted);
  font-size: 15px;
}

/* Error message */
.error-msg {
  color: var(--error);
  padding: 8px 12px;
  background: #2d1418;
  border: 1px solid #5c2327;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 8px;
}

/* Save indicator */
.save-indicator {
  font-size: 11px;
  color: var(--success);
  opacity: 0;
  transition: opacity 0.3s;
  margin-left: 8px;
}
.save-indicator.show { opacity: 1; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <h1><span>Canopy</span> Transcript Browser</h1>
  <div class="header-stats" id="header-stats"></div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="has-mcp">Has MCP</button>
  <button class="filter-btn" data-filter="labeled">Labeled</button>
  <button class="filter-btn" data-filter="unlabeled">Unlabeled</button>
</div>

<div class="main" id="main">
  <div class="loading-msg"><span class="spinner"></span> Loading transcripts...</div>
</div>

<script>
(function() {
  "use strict";

  // -- State --
  let transcripts = [];
  let activeFilter = "all";
  let expandedSession = null;
  let analysisResults = {};
  let proposalResults = {};
  let reviewResults = {};
  let transcriptData = {};

  // -- API helpers --
  async function api(method, path, body) {
    const opts = { method, headers: {} };
    if (body !== undefined) {
      opts.headers["Content-Type"] = "application/json";
      opts.body = JSON.stringify(body);
    }
    const res = await fetch(path, opts);
    if (!res.ok) {
      const text = await res.text();
      let msg;
      try { msg = JSON.parse(text).error; } catch(e) { msg = text; }
      throw new Error(msg || `HTTP ${res.status}`);
    }
    return res.json();
  }

  // -- Data loading --
  async function loadTranscripts() {
    try {
      transcripts = await api("GET", "/api/transcripts");
      render();
    } catch(e) {
      document.getElementById("main").innerHTML =
        `<div class="error-msg">Failed to load transcripts: ${esc(e.message)}</div>`;
    }
  }

  // -- Filtering --
  function filterTranscripts(list) {
    switch(activeFilter) {
      case "has-mcp":
        return list.filter(t => t.mcp_call_count > 0);
      case "labeled":
        return list.filter(t => t.label && t.label.quality !== "unlabeled");
      case "unlabeled":
        return list.filter(t => !t.label || t.label.quality === "unlabeled");
      default:
        return list;
    }
  }

  // -- Grouping --
  function groupByRepo(list) {
    const groups = {};
    const unmappedSessions = {};
    for (const t of list) {
      const repo = t.repo || null;
      if (repo) {
        if (!groups[repo]) groups[repo] = [];
        groups[repo].push(t);
      } else {
        const pk = t.project_key || "unknown";
        if (!unmappedSessions[pk]) unmappedSessions[pk] = [];
        unmappedSessions[pk].push(t);
      }
    }
    // Sort each group newest first
    for (const k of Object.keys(groups)) {
      groups[k].sort((a, b) => (b.last_ts || "").localeCompare(a.last_ts || ""));
    }
    for (const k of Object.keys(unmappedSessions)) {
      unmappedSessions[k].sort((a, b) => (b.last_ts || "").localeCompare(a.last_ts || ""));
    }
    return { mapped: groups, unmapped: unmappedSessions };
  }

  // -- Utility --
  function esc(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function formatDate(ts) {
    if (!ts) return "---";
    const d = new Date(ts);
    const now = new Date();
    const pad = n => String(n).padStart(2, "0");
    const dateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    if (d.toDateString() === now.toDateString()) return `Today ${timeStr}`;
    return `${dateStr} ${timeStr}`;
  }

  function truncate(s, n) {
    if (!s) return "";
    return s.length > n ? s.slice(0, n) + "..." : s;
  }

  function collectServers(sessions) {
    const s = new Set();
    for (const t of sessions) {
      if (t.mcp_servers) t.mcp_servers.forEach(x => s.add(x));
    }
    return Array.from(s).sort();
  }

  function qualityClass(q) {
    if (!q || q === "unlabeled") return "";
    return "badge-" + q;
  }

  // -- Rendering --
  function render() {
    const filtered = filterTranscripts(transcripts);
    const { mapped, unmapped } = groupByRepo(filtered);

    // Header stats
    const total = transcripts.length;
    const mcpCount = transcripts.filter(t => t.mcp_call_count > 0).length;
    const labeledCount = transcripts.filter(t => t.label && t.label.quality !== "unlabeled").length;
    document.getElementById("header-stats").textContent =
      `${total} sessions | ${mcpCount} with MCP | ${labeledCount} labeled`;

    const main = document.getElementById("main");
    main.innerHTML = "";

    // Mapped repos
    const repoNames = Object.keys(mapped).sort();
    for (const repo of repoNames) {
      main.appendChild(renderRepoGroup(repo, mapped[repo], false));
    }

    // Unmapped
    const unmappedKeys = Object.keys(unmapped).sort();
    if (unmappedKeys.length > 0) {
      const allUnmapped = [];
      for (const pk of unmappedKeys) {
        unmapped[pk].forEach(t => allUnmapped.push(t));
      }
      allUnmapped.sort((a, b) => (b.last_ts || "").localeCompare(a.last_ts || ""));
      main.appendChild(renderRepoGroup(null, allUnmapped, true, unmapped));
    }

    if (filtered.length === 0) {
      main.innerHTML = `<div class="loading-msg" style="color: var(--text-muted)">No transcripts match the current filter.</div>`;
    }
  }

  function renderRepoGroup(repo, sessions, isUnmapped, unmappedByKey) {
    const group = document.createElement("div");
    group.className = "repo-group";

    const servers = collectServers(sessions);

    // Header
    const header = document.createElement("div");
    header.className = "repo-header";
    header.innerHTML = `
      <span class="repo-chevron">&#9660;</span>
      <span class="repo-name ${isUnmapped ? 'unmapped' : ''}">${isUnmapped ? 'Unmapped' : esc(repo)}</span>
      <div class="repo-meta">
        <span>${sessions.length} session${sessions.length !== 1 ? 's' : ''}</span>
        <div class="servers">${servers.map(s => `<span class="server-pill">${esc(s)}</span>`).join("")}</div>
      </div>
    `;
    header.addEventListener("click", () => group.classList.toggle("collapsed"));
    group.appendChild(header);

    // Sessions container
    const container = document.createElement("div");
    container.className = "repo-sessions";

    if (isUnmapped && unmappedByKey) {
      // Group unmapped by project key, show assign buttons
      const usedKeys = new Set();
      for (const t of sessions) {
        const pk = t.project_key || "unknown";
        if (usedKeys.has(pk)) continue;
        usedKeys.add(pk);
        container.appendChild(renderAssignRepoRow(pk));
      }
    }

    for (const t of sessions) {
      container.appendChild(renderSessionRow(t));
      if (expandedSession === t.session_id) {
        container.appendChild(renderDetailPanel(t));
      }
    }

    group.appendChild(container);
    return group;
  }

  function renderAssignRepoRow(projectKey) {
    const row = document.createElement("div");
    row.className = "assign-repo-row";
    row.innerHTML = `
      <span class="assign-repo-key" title="${esc(projectKey)}">${esc(projectKey)}</span>
      <button class="assign-repo-btn" data-pk="${esc(projectKey)}">Assign Repo</button>
    `;
    const btn = row.querySelector(".assign-repo-btn");
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      // Replace button with input
      const input = document.createElement("input");
      input.type = "text";
      input.className = "assign-input";
      input.placeholder = "owner/repo";
      btn.replaceWith(input);
      input.focus();

      async function submit() {
        const val = input.value.trim();
        if (!val) return;
        input.disabled = true;
        try {
          await api("POST", `/api/repo-map/${encodeURIComponent(projectKey)}`, { repo: val });
          await loadTranscripts();
        } catch(err) {
          input.disabled = false;
          input.style.borderColor = "var(--error)";
          input.title = err.message;
        }
      }
      input.addEventListener("keydown", (ev) => { if (ev.key === "Enter") submit(); });
      input.addEventListener("blur", submit);
    });
    return row;
  }

  function renderSessionRow(t) {
    const row = document.createElement("div");
    row.className = "session-row" + (expandedSession === t.session_id ? " expanded" : "");
    const quality = t.label ? t.label.quality : "unlabeled";
    const qBadge = quality !== "unlabeled"
      ? `<span class="badge badge-quality ${qualityClass(quality)}">${esc(quality)}</span>`
      : "";
    const mcpBadge = t.mcp_call_count > 0
      ? `<span class="badge badge-mcp">${t.mcp_call_count} MCP</span>`
      : "";

    row.innerHTML = `
      <span class="session-date">${formatDate(t.last_ts)}</span>
      <span class="session-msg">${esc(truncate(t.first_msg, 80))}</span>
      <div class="session-badges">
        <span class="badge badge-lines">${t.lines} lines</span>
        <span class="badge badge-user">${t.user_msgs} msgs</span>
        ${mcpBadge}
        ${qBadge}
      </div>
    `;
    row.addEventListener("click", () => {
      expandedSession = expandedSession === t.session_id ? null : t.session_id;
      render();
    });
    return row;
  }

  // -- Detail panel --
  function renderDetailPanel(t) {
    const panel = document.createElement("div");
    panel.className = "detail-panel";

    const sid = t.session_id;
    const quality = t.label ? t.label.quality : "unlabeled";
    const tags = t.label ? (t.label.use_case_tags || []) : [];
    const evalCandidate = t.label ? !!t.label.eval_candidate : false;
    const notes = t.label ? (t.label.notes || "") : "";

    // Stats row
    const stats = document.createElement("div");
    stats.className = "detail-stats";
    stats.innerHTML = `
      <div class="detail-stat"><span class="detail-stat-value">${t.mcp_call_count || 0}</span><span class="detail-stat-label">MCP Calls</span></div>
      <div class="detail-stat"><span class="detail-stat-value">${t.user_msgs || 0}</span><span class="detail-stat-label">User Messages</span></div>
      <div class="detail-stat"><span class="detail-stat-value">${t.lines || 0}</span><span class="detail-stat-label">Lines</span></div>
    `;
    panel.appendChild(stats);

    // MCP servers
    if (t.mcp_servers && t.mcp_servers.length > 0) {
      const serverDiv = document.createElement("div");
      serverDiv.className = "detail-servers";
      serverDiv.innerHTML = t.mcp_servers.map(s => `<span class="server-pill">${esc(s)}</span>`).join("");
      panel.appendChild(serverDiv);
    }

    // Action buttons
    const actions = document.createElement("div");
    actions.className = "detail-actions";

    const analyzeBtn = makeActionBtn("Analyze", async (btn) => {
      const result = await api("POST", `/api/analyze/${sid}`);
      analysisResults[sid] = result;
      render();
    });

    const reviewBtn = makeActionBtn("AI Review", async (btn) => {
      const result = await api("POST", `/api/review/${sid}`);
      reviewResults[sid] = result;
      render();
    });

    const proposeBtn = makeActionBtn("Propose", async (btn) => {
      const result = await api("POST", `/api/propose/${sid}`);
      proposalResults[sid] = result;
      render();
    });
    if (!analysisResults[sid]) {
      proposeBtn.disabled = true;
      proposeBtn.title = "Run Analyze first";
    }

    const transcriptBtn = makeActionBtn("Full Transcript", async (btn) => {
      const result = await api("GET", `/api/transcript/${sid}`);
      transcriptData[sid] = result;
      render();
    });

    actions.append(analyzeBtn, reviewBtn, proposeBtn, transcriptBtn);
    panel.appendChild(actions);

    // Label controls
    panel.appendChild(renderLabelControls(sid, quality, tags, evalCandidate, notes));

    // Analysis results
    if (analysisResults[sid]) {
      panel.appendChild(renderObservations(analysisResults[sid]));
    }

    // Review results
    if (reviewResults[sid]) {
      panel.appendChild(renderReview(reviewResults[sid]));
    }

    // Proposal results
    if (proposalResults[sid]) {
      panel.appendChild(renderProposals(proposalResults[sid]));
    }

    // Transcript
    if (transcriptData[sid]) {
      panel.appendChild(renderTranscript(transcriptData[sid]));
    }

    return panel;
  }

  function makeActionBtn(label, handler) {
    const btn = document.createElement("button");
    btn.className = "action-btn";
    btn.textContent = label;
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      if (btn.disabled) return;
      btn.disabled = true;
      btn.classList.add("loading");
      const origText = btn.textContent;
      btn.innerHTML = `<span class="spinner"></span> ${origText}...`;
      try {
        await handler(btn);
      } catch(err) {
        btn.classList.remove("loading");
        btn.disabled = false;
        btn.textContent = origText;
        // Show error inline
        const errDiv = document.createElement("div");
        errDiv.className = "error-msg";
        errDiv.textContent = err.message;
        btn.parentElement.parentElement.appendChild(errDiv);
        setTimeout(() => errDiv.remove(), 5000);
      }
    });
    return btn;
  }

  // -- Label controls --
  function renderLabelControls(sid, quality, tags, evalCandidate, notes) {
    const wrapper = document.createElement("div");
    wrapper.className = "label-controls";

    const qualityOptions = [
      "unlabeled", "went-well", "had-friction", "disaster",
      "skip-coding", "skip-setup", "good-for-eval"
    ];

    wrapper.innerHTML = `
      <label>Quality</label>
      <div>
        <select id="lbl-quality-${sid}">
          ${qualityOptions.map(o => `<option value="${o}" ${o === quality ? "selected" : ""}>${o}</option>`).join("")}
        </select>
        <span class="save-indicator" id="save-ind-${sid}">Saved</span>
      </div>

      <label>Tags</label>
      <div>
        <div class="tag-pills" id="tag-pills-${sid}">${tags.map(t => `<span class="tag-pill">${esc(t)} <span class="remove" data-tag="${esc(t)}">&times;</span></span>`).join("")}</div>
        <input type="text" id="lbl-tags-${sid}" placeholder="Add tag, press Enter" style="margin-top:4px;width:100%">
      </div>

      <label>Eval candidate</label>
      <div class="checkbox-row">
        <input type="checkbox" id="lbl-eval-${sid}" ${evalCandidate ? "checked" : ""}>
        <label for="lbl-eval-${sid}" style="text-transform:none;font-size:13px;color:var(--text)">Mark for evaluation</label>
      </div>

      <label>Notes</label>
      <textarea id="lbl-notes-${sid}" placeholder="Add notes...">${esc(notes)}</textarea>
    `;

    // Auto-save helper
    let saveTimeout = null;
    function saveLabels() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(async () => {
        const currentTags = [];
        wrapper.querySelectorAll(".tag-pill").forEach(p => {
          const t = p.querySelector(".remove");
          if (t) currentTags.push(t.dataset.tag);
        });
        const data = {
          quality: wrapper.querySelector(`#lbl-quality-${sid}`).value,
          use_case_tags: currentTags,
          eval_candidate: wrapper.querySelector(`#lbl-eval-${sid}`).checked,
          notes: wrapper.querySelector(`#lbl-notes-${sid}`).value,
        };
        try {
          await api("POST", `/api/labels/${sid}`, data);
          // Update local state
          const t = transcripts.find(x => x.session_id === sid);
          if (t) t.label = data;
          // Flash save indicator
          const ind = document.getElementById(`save-ind-${sid}`);
          if (ind) { ind.classList.add("show"); setTimeout(() => ind.classList.remove("show"), 1500); }
        } catch(e) { /* silently fail */ }
      }, 400);
    }

    // Attach events after DOM insertion
    setTimeout(() => {
      const q = document.getElementById(`lbl-quality-${sid}`);
      if (q) q.addEventListener("change", saveLabels);

      const evalCb = document.getElementById(`lbl-eval-${sid}`);
      if (evalCb) evalCb.addEventListener("change", saveLabels);

      const notesEl = document.getElementById(`lbl-notes-${sid}`);
      if (notesEl) notesEl.addEventListener("input", saveLabels);

      const tagsInput = document.getElementById(`lbl-tags-${sid}`);
      if (tagsInput) {
        tagsInput.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter") {
            ev.preventDefault();
            const val = tagsInput.value.trim();
            if (!val) return;
            // Add comma-separated tags
            const newTags = val.split(",").map(t => t.trim()).filter(Boolean);
            const pillsContainer = document.getElementById(`tag-pills-${sid}`);
            for (const tag of newTags) {
              const pill = document.createElement("span");
              pill.className = "tag-pill";
              pill.innerHTML = `${esc(tag)} <span class="remove" data-tag="${esc(tag)}">&times;</span>`;
              pill.querySelector(".remove").addEventListener("click", (e) => {
                e.stopPropagation();
                pill.remove();
                saveLabels();
              });
              pillsContainer.appendChild(pill);
            }
            tagsInput.value = "";
            saveLabels();
          }
        });
      }

      // Remove tag click handlers
      wrapper.querySelectorAll(".tag-pill .remove").forEach(el => {
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          el.parentElement.remove();
          saveLabels();
        });
      });
    }, 0);

    return wrapper;
  }

  // -- Observations --
  function renderObservations(data) {
    const area = document.createElement("div");
    area.className = "result-area";
    area.innerHTML = `<h3>Analysis Observations</h3>`;
    if (data.error) {
      area.innerHTML += `<div class="error-msg">${esc(data.error)}</div>`;
      return area;
    }
    const list = Array.isArray(data) ? data : [];
    if (list.length === 0) {
      area.innerHTML += `<div style="color:var(--text-muted)">No observations found.</div>`;
      return area;
    }
    for (const obs of list) {
      const typeClass = "obs-type-" + (obs.type || obs.obs_type || "gap");
      area.innerHTML += `
        <div class="obs-card">
          <div class="obs-card-header">
            <span class="obs-type ${typeClass}">${esc(obs.type || obs.obs_type || "?")}</span>
            <span class="obs-severity">${esc(obs.severity || "")}</span>
          </div>
          <div class="obs-desc">${esc(obs.description || "")}</div>
          ${(obs.related_servers && obs.related_servers.length) ?
            `<div class="obs-servers">${obs.related_servers.map(s => `<span class="server-pill">${esc(s)}</span>`).join(" ")}</div>` : ""}
        </div>
      `;
    }
    return area;
  }

  // -- Proposals --
  function renderProposals(data) {
    const area = document.createElement("div");
    area.className = "result-area";
    area.innerHTML = `<h3>Proposals</h3>`;
    if (data.error) {
      area.innerHTML += `<div class="error-msg">${esc(data.error)}</div>`;
      return area;
    }
    const list = Array.isArray(data) ? data : [];
    if (list.length === 0) {
      area.innerHTML += `<div style="color:var(--text-muted)">No proposals generated.</div>`;
      return area;
    }
    for (const p of list) {
      area.innerHTML += `
        <div class="proposal-card">
          <div class="proposal-header">
            <span class="proposal-type">${esc(p.type || p.proposal_type || "?")}</span>
            <span class="proposal-action">${esc(p.action || "")}</span>
          </div>
          ${p.target_repo ? `<div class="proposal-detail"><strong>Target:</strong> ${esc(p.target_repo)}</div>` : ""}
          ${p.motivation ? `<div class="proposal-detail">${esc(p.motivation)}</div>` : ""}
          ${p.complexity ? `<div class="proposal-detail"><strong>Complexity:</strong> ${esc(p.complexity)}</div>` : ""}
        </div>
      `;
    }
    return area;
  }

  // -- Review --
  function renderReview(data) {
    const area = document.createElement("div");
    area.className = "result-area";
    area.innerHTML = `<h3>AI Review</h3>`;
    if (data.error) {
      area.innerHTML += `<div class="error-msg">${esc(data.error)}</div>`;
      return area;
    }
    const content = data.content || "";
    const html = renderMarkdown(content);
    area.innerHTML += `<div class="review-content">${html}</div>`;
    return area;
  }

  // Simple markdown renderer (no deps)
  function renderMarkdown(md) {
    let html = esc(md);

    // Code blocks (``` ... ```)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code}</code></pre>`
    );

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Headers
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Blockquotes
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    // Unordered lists
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
    // Clean up nested ul
    html = html.replace(/<\/ul>\s*<ul>/g, '');

    // Paragraphs (double newlines)
    html = html.replace(/\n\n/g, '</p><p>');
    html = '<p>' + html + '</p>';
    html = html.replace(/<p>\s*<(h[123]|ul|pre|blockquote)/g, '<$1');
    html = html.replace(/<\/(h[123]|ul|pre|blockquote)>\s*<\/p>/g, '</$1>');
    html = html.replace(/<p>\s*<\/p>/g, '');

    return html;
  }

  // -- Transcript viewer --
  function renderTranscript(entries) {
    const area = document.createElement("div");
    area.className = "result-area";
    area.innerHTML = `<h3>Full Transcript</h3>`;

    const viewer = document.createElement("div");
    viewer.className = "transcript-viewer";

    for (const entry of entries) {
      const type = entry.type;

      // Skip system and file-history-snapshot entries
      if (type === "system" || type === "file-history-snapshot") continue;

      if (type === "user") {
        const msg = entry.message || {};
        const content = msg.content;
        if (typeof content === "string" && content) {
          const div = document.createElement("div");
          div.className = "transcript-entry msg-user-row";
          div.innerHTML = `<div class="msg-bubble msg-user"><div class="msg-label">User</div>${esc(content)}</div>`;
          viewer.appendChild(div);
        } else if (Array.isArray(content)) {
          for (const block of content) {
            if (block.type === "text" && block.text) {
              const div = document.createElement("div");
              div.className = "transcript-entry msg-user-row";
              div.innerHTML = `<div class="msg-bubble msg-user"><div class="msg-label">User</div>${esc(block.text)}</div>`;
              viewer.appendChild(div);
            } else if (block.type === "tool_result") {
              const div = document.createElement("div");
              div.className = "transcript-entry";
              const resultText = typeof block.content === "string"
                ? block.content
                : Array.isArray(block.content)
                  ? block.content.map(c => c.text || JSON.stringify(c)).join("\n")
                  : JSON.stringify(block.content, null, 2);
              div.innerHTML = `
                <div class="tool-result-block">
                  <div class="tool-result-toggle">&#9654; Tool Result${block.tool_use_id ? ` (${esc(block.tool_use_id.slice(0,8))})` : ""}</div>
                  <div class="tool-result-content">${esc(truncate(resultText, 5000))}</div>
                </div>`;
              div.querySelector(".tool-result-toggle").addEventListener("click", () => {
                div.querySelector(".tool-result-block").classList.toggle("open");
                const arrow = div.querySelector(".tool-result-toggle");
                arrow.innerHTML = arrow.innerHTML.replace(/[&#9654;&#9660;]/g, "") ;
                const isOpen = div.querySelector(".tool-result-block").classList.contains("open");
                arrow.innerHTML = (isOpen ? "&#9660;" : "&#9654;") + arrow.textContent;
              });
              viewer.appendChild(div);
            }
          }
        }
      } else if (type === "assistant") {
        const msg = entry.message || {};
        const content = msg.content;
        if (Array.isArray(content)) {
          for (const block of content) {
            if (block.type === "thinking") {
              const div = document.createElement("div");
              div.className = "transcript-entry";
              div.innerHTML = `
                <div class="thinking-block">
                  <div class="thinking-toggle">&#9654; Thinking...</div>
                  <div class="thinking-content">${esc(truncate(block.thinking || "", 3000))}</div>
                </div>`;
              div.querySelector(".thinking-toggle").addEventListener("click", () => {
                div.querySelector(".thinking-block").classList.toggle("open");
              });
              viewer.appendChild(div);
            } else if (block.type === "text" && block.text) {
              const div = document.createElement("div");
              div.className = "transcript-entry msg-assistant-row";
              div.innerHTML = `<div class="msg-bubble msg-assistant"><div class="msg-label">Assistant</div>${esc(block.text)}</div>`;
              viewer.appendChild(div);
            } else if (block.type === "tool_use") {
              const div = document.createElement("div");
              div.className = "transcript-entry";
              const inputStr = block.input ? JSON.stringify(block.input, null, 2) : "";
              div.innerHTML = `
                <div class="tool-call-block">
                  <div class="tool-call-name">${esc(block.name || "tool_use")}</div>
                  <div class="tool-call-input">${esc(truncate(inputStr, 2000))}</div>
                </div>`;
              viewer.appendChild(div);
            }
          }
        }
      }
    }

    area.appendChild(viewer);
    return area;
  }

  // -- Filter bar --
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  // -- Init --
  loadTranscripts();
})();
</script>
</body>
</html>
