# Concept-eval rubric for ddd-concept-eval (SP3.1)
# Seven weighted dimensions; weights sum to 1.0.
# overall_rule: lowest  (weakest-link scoring — one bad dim fails the eval)
#   NOTE: overall_rule applies to NON-ADVISORY dimensions only.
#   claim_reality_coherence has advisory: true and is EXCLUDED from the
#   weakest-link overall_score computation (see SKILL.md Step 4).
#
# History:
# - v0.2.153 split design_soundness (interaction coherence) into TWO dims by
#   factoring out a new visual_polish dim. The 5-dim rubric mis-routed
#   pure-visual failures (misalignment, garish colors, bad type, crowded
#   layouts, inconsistent buttons) into design_soundness, whose anchors and
#   deduction rules were about INTERACTION soundness — so ugly UI shipped
#   with a passing concept-eval score. visual_polish (0.15) gives the
#   visual-judge a place to land those findings; design_soundness keeps the
#   interaction-coherence scope and drops to 0.20. motion_friction trimmed
#   to 0.15 and claim_reality_coherence to 0.10 to keep totals at 1.00.
#
# ## Calibration status
# Provisional rubric; calibrate via a defect-creator analog after 3 real runs
# (deferred per spec). Not yet calibrated. visual_polish dim is brand-new and
# untouched by the original calibration plan — expect the most score noise
# here in the first few runs.

overall_rule: lowest

# Output schema for design_findings[] collected during the eval.
# Each finding: {scene, dimension, severity, route, detail, fix_recommendation, fix_kind}
# route must be one of the route_values below.
# fix_kind must be one of the fix_kind_values below.
design_findings_output:
  fields: [scene, dimension, severity, route, detail, fix_recommendation, fix_kind]
  route_values: [PRODUCT, CONCEPT, RESEARCH, DEFER]
  # fix_kind tells the orchestrator whether the fix is auto-applicable, so it
  # can decide "apply this now" vs "ask the user" WITHOUT having to re-parse
  # the fix_recommendation prose. The discriminator:
  #
  #   mechanical = single concrete action. fix_recommendation names one
  #     specific change (rename a field, patch a URL, add a picker, add a
  #     spine item with full text). The orchestrator can apply it via Edit
  #     (and PR + deploy for code) without choosing between options.
  #     This is the COMMON case when a rubric is well-tuned — most findings
  #     have an obvious one-true-fix.
  #
  #   options = the recommendation lists 2+ paths and the judge couldn't
  #     pick one. Smell: words like "Alternative:", "or", "consider X or Y",
  #     "could also". Requires a user pick. Surface; don't auto-apply.
  #
  #   redesign = the underlying idea needs rethinking; no single concrete
  #     change would address it. Smell: "the design itself doesn't hold",
  #     "this whole approach...", recommendations that are themselves
  #     questions. Surface as concept_change; do NOT auto-apply.
  #
  # Picking conservatively: when in doubt, prefer `options` over `mechanical`.
  # A wrongly-auto-applied finding is much worse than one extra prompt.
  fix_kind_values: [mechanical, options, redesign]

# ─────────────────────────────────────────────────────────────────────────
# OBJECTIVE-DATA STANDING RULE (read BEFORE scoring any data / evidence artifact)
# ─────────────────────────────────────────────────────────────────────────
# Many products exist to present EVIDENCE the user must judge for themselves —
# dashboards, monitoring, analytics, audit/QA screens. For these the demo's job
# is to show the objective data CLEANLY and let the reader draw the conclusion,
# with explanations available ON DEMAND (info bubbles, tooltips, legends,
# progressive disclosure). Score accordingly:
#
#  • REWARD clean, uncluttered presentation of the raw measures, clear labels,
#    and explanations the user opts into (an "i" bubble defining a metric, a
#    legend, a method citation). A demo that shows the numbers plainly and lets
#    the reader conclude scores HIGHER than one that pre-digests the verdict.
#  • Do NOT reward — and DEDUCT for — on-screen EDITORIALIZING: derived
#    "headline" conclusions, verdict banners, interpretive callouts ("the gap is
#    +17 pts!"), or alarm-coloring that tells the user what to think. A
#    pre-chewed conclusion stamped on the chart is a FLAW here, not polish. Do
#    NOT recommend "add a one-line takeaway / headline stat / verdict banner" as
#    a fix for an evidence artifact — that is the wrong direction. For an
#    evidence product the takeaway IS the data, legibly shown, not a sentence.
#  • Color / emphasis is justified ONLY when it encodes an OBJECTIVE fact — a
#    value crossing a STATED threshold, or two recorded values that literally
#    differ — never a subjective judgment. A bright "this is bad" fill that
#    editorializes is a deduction; the same flag shown as a calm, defined marker
#    with its meaning in a bubble is fine.
#  • Objective interpretation that is load-bearing (a threshold rule, a metric
#    definition) belongs in an explanation the user can OPEN, not asserted as a
#    conclusion on the face of the chart.
#
# This rule does NOT apply to artifacts whose job is genuinely persuasion (a
# pitch, a marketing page) — judge those by whether the argument lands. The
# discriminator is the product's OWN intent, stated in the scene's
# concept_claim / design_intent. When the concept is "show the user the
# evidence and let them decide", reward restraint, not salesmanship.
# ─────────────────────────────────────────────────────────────────────────

dimensions:
  - id: concept_clarity
    label: "Concept Clarity"
    weight: 0.15
    default_score: 3
    anchor:
      "5": "A smart outsider watching the walkthrough for the first time can state in one sentence what the product does and why it matters — without any verbal caveats from the presenter."
      "4": "Concept is clear; one scene requires a spoken bridge to land the 'why it matters' for a cold audience."
      "3": "Concept is understandable to someone already familiar with the space, but a true outsider would need a question answered. (DEFAULT)"
      "2": "The walkthrough establishes what the product does but not why anyone would want it; or it assumes context a new viewer won't have."
      "1": "A smart outsider would leave confused about both what the product is and why it matters."
    deduction_rules:
      - "No scene names a concrete user or role the product serves: max 3"
      - "Opening scene fails to establish the problem being solved: max 2"

  - id: use_case_soundness
    label: "Use-Case Soundness (Is this worth demonstrating?)"
    weight: 0.15
    default_score: 3
    # SCOPE: is the demonstrated USE of the feature substantive and load-bearing,
    # or trivial/toy? This is the "skeptical buyer" test and is DISTINCT from
    # every other dimension: a demo can be perfectly CLEAR (concept_clarity),
    # interaction-COHERENT (design_soundness), and faithfully GROUNDED in its own
    # why-brief (why_groundedness) while still showing the feature doing something
    # that doesn't matter. why_groundedness checks the claim traces to the
    # why-brief; it does NOT ask whether the use case itself is worth the feature.
    # This dimension asks exactly that — and it is judged on EVERY render, not
    # just at the narrative gate, so an accepted-but-thin narrative still gets
    # caught rather than silently polished. Score against the WHOLE walkthrough
    # (the story), not per-scene chrome.
    anchor:
      "5": "The walkthrough shows the feature doing load-bearing work on a task that obviously matters — a skeptical buyer sees real, non-trivial value the product uniquely provides."
      "4": "A sound, credible use of the feature; it does meaningful work, though the stakes or scale shown are modest."
      "3": "Plausible but underwhelming — the use is real but small; a skeptic could reasonably ask 'is that all it does?' (DEFAULT)"
      "2": "The demonstrated use is trivial or contrived — the feature is exercised on an input too small to warrant it, or on a task a user wouldn't actually need it for (e.g. an AI coach invoked on a one-line answer)."
      "1": "A toy demo — the shown use actively makes the feature look pointless; a buyer would conclude it solves nothing real."
    deduction_rules:
      - "The feature operates on an input too trivial to warrant it (e.g. AI assistance on a single short field, an analysis over one/two data points): max 2"
      - "The exact task shown would be as easy or easier WITHOUT the feature: max 2"
      - "The walkthrough never shows the feature at the scale/complexity where its value would actually be felt: max 3"
    # ROUTING: a use_case_soundness finding is ALWAYS route=CONCEPT, fix_kind=redesign
    # — fixing a thin use case means changing WHAT is demonstrated (the narrative),
    # not polishing pixels. That routes to the concept_change gate, which re-opens
    # even a LOCKED narrative for redraft. Never PRODUCT, never mechanical.

  - id: design_soundness
    label: "Design Soundness (Interaction Coherence)"
    weight: 0.20
    default_score: 3
    # SCOPE: interaction soundness, not visual polish.
    # This dim asks "does the product's interaction model hold together?" —
    # affordances, flow, action coherence, error handling. Pure visual quality
    # (alignment, type, color, spacing, button styling) lives in visual_polish.
    anchor:
      "5": "Every interaction shown is coherent — inputs lead to outputs that match the concept; there are no dead ends, contradictory affordances, or unexplained leaps."
      "4": "Interactions are sound; one flow step feels slightly off (e.g. an unexpected modal, an unlabeled action) but doesn't break the idea."
      "3": "The idea holds together at a high level; some interactions are hand-wavy or skipped over in the footage. (DEFAULT)"
      "2": "At least one core interaction shown is incoherent or would confuse a first-time user trying to reproduce it."
      "1": "The walkthrough shows interactions that contradict each other or that break the product's own logic."
    deduction_rules:
      - "A scene shows an error state without explaining it: max 2"
      - "A core action is clicked off-camera or skipped entirely with no narration: max 3"
      # Action-fidelity (only when context.action_trace is present): a core
      # interaction the narration calls out is absent from the trace entirely
      # (the demo never performed it) — incoherent, the shown flow contradicts
      # the claimed one: max 2. (The capture/timing framing of the same gap is
      # motion_friction's job; this rule is for when the INTERACTION MODEL the
      # narration describes was never exercised at all.)
      - "Narration describes a core interaction the action_trace never performs (no effecting action for the claimed act): max 2"

  - id: visual_polish
    label: "Visual Polish"
    weight: 0.12
    default_score: 3
    # SCOPE: does the demo present a POLISHED PRODUCT — judged as the product's
    # real user sees it in a normal viewport. Alignment, typographic hierarchy,
    # color/contrast, whitespace rhythm, control consistency, and the legibility
    # of the scene's load-bearing content. Carved out of design_soundness in
    # v0.2.153 so pure visual failures have a place to land. Tough Judge
    # methodology applies: start from 3, adversarial-list first, deduct.
    #
    # TWO STANDING RULES for product_walkthrough artifacts (read BEFORE scoring):
    #
    # 1. HOST-PRODUCT CHROME IS GROUNDING, NOT A FLAW. The platform frame the
    #    product lives in — its top nav, side rail, branding, account menu,
    #    breadcrumbs — is what makes the demo read as a REAL shipping product
    #    instead of a detached mockup. Its PRESENCE is required and must NEVER be
    #    deducted, listed as a flaw, or used to cap a score. "Looks like a tool",
    #    "too much app chrome", "busy shell" are NOT findings. Only genuinely
    #    BROKEN chrome counts: a frame element overlapping/occluding content, a
    #    z-index collision, a placeholder/unstyled nav. Deduct the breakage, never
    #    the frame.
    #
    # 2. FINDINGS DRIVE THE PRODUCT, NEVER THE CAMERA. Judge the product as its
    #    user sees it in one viewport and recommend PRODUCT changes only. If the
    #    load-bearing number/chart is too small to read, the finding is "the
    #    PRODUCT should present it prominently" (a bigger hero, a focused/expanded
    #    view, progressive disclosure) — NEVER "zoom in", "crop the capture", or
    #    "set full_page:false". A capture trick that makes an over-dense product
    #    look good HIDES a real product-readiness gap, and the demo's whole job is
    #    to show a product worth shipping. (One exception that is NOT a polish
    #    finding: a full-PAGE screenshot of a long scrolling page is an inaccurate
    #    CAPTURE — a user never sees a 16k-px strip — so judge the real viewport
    #    instead and flag the strip once as a capture-accuracy note; do not score
    #    the product down for it, and do not "fix" it by cropping to fake legibility.)
    anchor:
      "5": "Every scene is shippable as marketing material — tight alignment, intentional type hierarchy, semantic consistent color, breathing whitespace, and the load-bearing content legible at a glance — WITH the host-product frame present, which grounds it as a real product. A designer would say 'this is well crafted, and it's clearly the real product'."
      "4": "Visually polished overall; one scene has a minor issue (a label crowded against a chart edge, one inconsistent button style, a slightly small secondary label) that doesn't read as a quality signal."
      "3": "Functional but unremarkable — the UI does its job without distinction; a designer would have notes on alignment, type, or spacing in at least one scene. (DEFAULT)"
      "2": "Multiple visual issues a careful viewer would notice IN THE PRODUCT ITSELF: misaligned elements, jarring color, inconsistent controls within a page, or the scene's load-bearing content too dense/small to read at a normal viewport — a product-presentation gap, fixable only in the product."
      "1": "The UI looks unfinished or amateur — unshippable. Broken alignment, garish color, real content overflow/occlusion, or chrome that reads as placeholder. (The PRESENCE of a normal product frame is never what lands a scene here.)"
    deduction_rules:
      - "Host-product chrome present and intact: NOT a deduction — it is grounding (standing rule 1)"
      - "A frame/nav element overlaps or occludes content, or a z-index collision: max 2 (product layout bug — fix in the product, e.g. scroll-margin, not by re-cropping the capture)"
      - "Misaligned UI elements visible in 2+ scenes: max 2"
      - "Inconsistent button or control styles within a single scene: max 3"
      - "Low-contrast text against background (likely WCAG AA failure): max 2"
      - "The scene's load-bearing content is too small/dense to read at a normal viewport: max 3 (PRODUCT finding — the product needs a focused/larger presentation; do NOT recommend zoom/crop/full_page as the fix)"
      - "Real content (not a full-page-strip capture artifact) overflows the viewport or wraps awkwardly: max 3"
      - "Typography hierarchy is flat or arbitrary (no visible H1/H2/body distinction): max 3"
      - "Color usage is decorative rather than semantic (random brand-accent on non-action elements): max 3"
      - "On-screen EDITORIALIZING of data — a derived verdict/headline callout, an interpretive banner, or alarm-coloring that tells the user the conclusion rather than showing the objective measure (see OBJECTIVE-DATA STANDING RULE): max 3. (Color/emphasis encoding an objective fact — a value crossing a stated threshold, values that literally differ — is NOT this; a 'this is bad' fill that editorializes IS.)"

  - id: why_groundedness
    label: "Why Groundedness"
    weight: 0.15
    default_score: 3
    anchor:
      "5": "Every scene's concept_claim traces directly to a named why_brief spine item with matching rationale and non-assumed evidence. The provenance chain is unbroken from claim to evidence."
      "4": "All concept_claims trace to the why_brief; one claim's provenance points to a spine item whose evidence is assumed rather than grounded."
      "3": "Most concept_claims are backed by the why_brief; 1-2 claims are asserted in narration without a clear provenance link. (DEFAULT)"
      "2": "Multiple concept_claims have no traceable connection to the why_brief spine — they appear to have been invented for the walkthrough."
      "1": "The walkthrough's concept_claims are systematically disconnected from the why_brief; the product could be anything."
    deduction_rules:
      - "A scene's provenance field is empty or 'n/a': max 2 per offending scene"
      - "A concept_claim directly contradicts a why_brief spine item: max 2 per offending scene"

  - id: claim_reality_coherence
    label: "Claim–Reality Coherence"
    weight: 0.10
    default_score: 3
    # This dimension is scored and surfaced but NEVER causes verdict=blocked.
    # advisory: true means it is excluded from the weakest-link overall_score.
    # Weight trimmed from 0.15 → 0.10 in v0.2.153 to make room for visual_polish
    # at 0.15; advisory status preserved (this dim shapes routing, not verdict).
    blocking: false
    advisory: true
    anchor:
      "5": "Every narration claim is fully demonstrated in the captured footage: numbers match, features shown exist in the UI, no 'coming soon' moments."
      "4": "Claims are mostly demonstrated; one claim is narrated but only partially visible in the screenshot."
      "3": "Most claims are shown; 1-2 claims require the viewer to trust the narrator rather than what they can see. (DEFAULT)"
      "2": "Multiple narration claims have no corresponding evidence in the footage — the narrator says things the screenshots don't back up."
      "1": "The walkthrough's narration systematically overstates what the footage shows; a viewer would feel misled."
    deduction_rules:
      - "Narrated statistic or number not visible anywhere in the captured page text: max 2 per scene"
      - "Narration references a UI element not present in the screenshot: max 2 per scene"

  - id: motion_friction
    label: "Motion Friction"
    weight: 0.13
    default_score: 3
    # Weight trimmed from 0.20 → 0.15 in v0.2.153 to make room for visual_polish.
    #
    # NARRATED-SUBJECT FRAMING (the camera/scripting axis — distinct from
    # visual_polish). This dim owns how the WALKTHROUGH frames the product over
    # time: where each scene is scrolled, what is on-screen while the narration
    # talks about it, and whether the viewer sees a settled frame or a
    # half-loaded/mis-scrolled one. The litmus the user keeps hitting:
    #   "If the UI CAN fully show the area we are narrating on, it SHOULD."
    # When a scene's narration is ABOUT a specific artifact (a chart, a map, a
    # table, a panel) and that artifact would fit in one viewport, the scene must
    # scroll so it is FULLY in frame before/while it is narrated — not clipped at
    # the top/bottom nor pushed into a corner under unrelated content. The fix is
    # always a SCRIPTING change (scroll_to / scroll / a settle-hold / trim the
    # clip to content-ready), never a product change. This does NOT contradict
    # visual_polish standing-rule 2 ("findings drive the product, never the
    # camera"): that rule applies when the artifact is too DENSE to fit a viewport
    # (a real product gap). Here the artifact DOES fit and the scene simply framed
    # it wrong — a walkthrough-scripting miss, which is exactly motion_friction's
    # job. Discriminator: fits-but-mis-framed → motion_friction (fix the scene);
    # doesn't-fit → visual_polish (fix the product).
    #
    # ACTION-FIDELITY (only when context.action_trace is provided). A scene is
    # scored from ONE still screenshot — so a scene that filled+submitted a form
    # and one that only HOVERED over the same controls produce the SAME frame.
    # When the caller passes the scene's action_trace (the run-report slice:
    # {kind, target, ok, must_succeed, note}), this dim owns whether the demo
    # ACTUALLY PERFORMED the act its narration claims, and whether the captured
    # frame is the legible RESULT of that act. EFFECTING kinds = click /
    # click_menu / fill / select / type / press / draw; NON-EFFECTING = hover /
    # scroll_to / scroll / wait_for / hold / goto. When action_trace is ABSENT,
    # ignore these rules and score motion as before (back-compat).
    anchor:
      "5": "The walkthrough flows naturally — transitions are smooth, every scene is scrolled so the artifact it narrates is fully in frame and settled before the voiceover talks about it; no scene requires the viewer to mentally skip awkward moments; the product looks like a pleasure to use."
      "4": "Flow is mostly smooth; one scene has a noticeable hesitation, slow load, clunky transition, or slightly-off framing (the narrated artifact partly clipped) that a script revision could fix."
      "3": "There are rough edges visible (slow loads, jarring page transitions, confusing navigation order, a narrated element only partly in frame) but they don't stop the demo. (DEFAULT)"
      "2": "Multiple scenes have friction points that would cause a live demo presenter to stutter or skip ahead — including narrating an artifact that is half off-screen when it would have fit; the product looks hard to use."
      "1": "The walkthrough is so friction-laden that the product appears broken or unusable to a viewer watching cold."
    deduction_rules:
      - "A scene shows a loading spinner dominating the frame: max 3"
      - "A scene opens on a blank/white or still-painting frame (navigation not yet rendered) that lingers more than ~1s before content appears, or the voiceover starts over a blank/half-loaded screen: max 2 (SCRIPTING fix — trim the scene's clip to content-ready, add a settle-hold, or prewarm; never narrate over a white screen)"
      - "A scene's narration is ABOUT a specific UI artifact (chart, map, table, panel) that fits in one viewport, but the capture is scrolled so that artifact is partially out of frame / clipped top or bottom / buried under unrelated content when the scene could have framed it fully: max 2 (SCRIPTING fix — scroll_to / scroll the scene so the narrated artifact is fully visible before it is narrated; this is the fits-but-mis-framed case, NOT a visual_polish density finding)"
      - "An on-screen action the narration calls out (a toggle, a filter, a tab switch) fires well before or after the words describing it, so the viewer doesn't see the change happen when it is mentioned: max 3 (SCRIPTING fix — time the action's hold so it lands with the voiceover)"
      - "Scene order requires the viewer to go backwards conceptually (later scenes set up earlier ones): max 2"
      - "A navigational dead-end is captured (404, blank page, error) with no recovery shown: max 1"
      # Action-fidelity (only when context.action_trace is present):
      - "Narration claims an action the action_trace never performs — hover-only (no fill/click/select/type/press/draw) where a fill/click is implied: max 2"
      - "A must_succeed action failed (action_trace entry ok:false with must_succeed:true), OR the captured frame doesn't show the claimed action's RESULT (an effecting action came back ok:false): max 2"
      - "The action sequence is not legible — a viewer can't tell what was done from the capture + trace (e.g. the trace shows only camera moves while the narration describes a multi-step operation): max 3"
