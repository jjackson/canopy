# Neutral, asset-free sample so the engine renders + previews standalone
# with no brand pack or program content. It carries its OWN beats: list of
# content-free framing beats only — so it does NOT inherit the global_style
# starter timeline (whose body_scene/body_product_beats would require
# scene/product fields this sample deliberately omits). Replace with your
# own program spec to author.
beats:
  - { id: hook,    kind: intro_hook,    seconds: 4 }
  - { id: cycle,   kind: intro_cycle,   seconds: 8 }
  - { id: handoff, kind: intro_handoff, seconds: 3 }
  - { id: cta,     kind: outro_cta,     seconds: 6 }

