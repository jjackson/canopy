narration:
  generator: manual
  prompt_version: v1
  start_seconds: 0
  by_beat:
    title: Create Survey Solicitation
    s1: Maya has designed her matched study. But to measure her own program credibly,
      the survey has to be run by someone independent. So she needs to recruit a survey
      firm — to visit the households and collect the outcomes. Rather than start a
      separate process, she turns the finished study into a call for a firm on the
      Connect network, with the wards, coverage, and scope already attached.
    s2: Maya's finished Round 6 study sits in her portfolio, flagged ready to solicit
      — and right on the card is the way to turn that plan into a call for a survey
      firm, no separate tool.
    s3: Maya builds the call. The title, scope and coverage carry over from her study.
      She adds a description, the type, timeline, scale and contact - the call can
      go out publicly across the whole Connect network, or be pointed at organizations
      she already knows work here - and she writes an application question for the
      firms.
    s4: Then, instead of hand-writing a scoring rubric, she clicks Generate with AI
      - and the platform drafts the evaluation criteria, weighted, straight from her
      scope and questions. She reviews them, and publishes the call.
    s5: A survey firm opens the call. The scoring criteria Maya generated show right
      beside each question, so the firm knows exactly how it will be judged - and
      it drafts its answer.
    s6: Before submitting, the firm runs the draft through the AI Application Coach
      - which reviews it against those same criteria and suggests where to strengthen
      it. The firm picks the coverage it can staff, and submits.
    s7: Back in her workspace, Maya opens the responses and sees Sahel Field Research
      tied to the exact coverage she designed.
    s8: She awards Sahel Field Research — the screen records the decision and notifies
      the organization. Standing up the live opportunity is the next step, not yet
      built.
    outro: ''
  script: 'Create Survey Solicitation

    Maya has designed her matched study. But to measure her own program credibly,
    the survey has to be run by someone independent. So she needs to recruit a survey
    firm — to visit the households and collect the outcomes. Rather than start a separate
    process, she turns the finished study into a call for a firm on the Connect network,
    with the wards, coverage, and scope already attached.

    Maya''s finished Round 6 study sits in her portfolio, flagged ready to solicit
    — and right on the card is the way to turn that plan into a call for a survey
    firm, no separate tool.

    Maya builds the call. The title, scope and coverage carry over from her study.
    She adds a description, the type, timeline, scale and contact - the call can go
    out publicly across the whole Connect network, or be pointed at organizations
    she already knows work here - and she writes an application question for the firms.

    Then, instead of hand-writing a scoring rubric, she clicks Generate with AI -
    and the platform drafts the evaluation criteria, weighted, straight from her scope
    and questions. She reviews them, and publishes the call.

    A survey firm opens the call. The scoring criteria Maya generated show right beside
    each question, so the firm knows exactly how it will be judged - and it drafts
    its answer.

    Before submitting, the firm runs the draft through the AI Application Coach -
    which reviews it against those same criteria and suggests where to strengthen
    it. The firm picks the coverage it can staff, and submits.

    Back in her workspace, Maya opens the responses and sees Sahel Field Research
    tied to the exact coverage she designed.

    She awards Sahel Field Research — the screen records the decision and notifies
    the organization. Standing up the live opportunity is the next step, not yet built.'
