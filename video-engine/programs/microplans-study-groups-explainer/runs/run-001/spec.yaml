    s3: The visits blanket the whole of Attakar ward, showing where Connect has records
      of service delivery.  She decides she'll use the administrative boundaries —
      wards — as the survey units.
    s4: Maya clicks on Attakar to select it and tags it as the intervention arm. Maya
      switches the plan to sampling mode and clicks "Compare surrounding boundaries".
      The tool finds every ward that shares a border with Attakar, measures each one's
