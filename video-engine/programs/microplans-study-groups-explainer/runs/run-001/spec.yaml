  script: 'Design a controlled two-arm study, right from the map

    Maya wants to start a brand-new two-arm study, so she creates a new study on her
    existing Kaura programme.

    Maya clicks “+ Add a plan in the editor”, and in the plan UI she turns on the
    service-delivery data for the opportunity she''s building the study around — a
    child health campaign.

    The visits blanket the whole of Attakar ward, showing where Connect has records
    of service delivery.  She decides she''ll use the administrative boundaries —
    wards — as the survey units.

    Maya clicks on Attakar to select it and tags it as the intervention arm. Maya
    switches the plan to sampling mode and clicks "Compare surrounding boundaries".
    The tool finds every ward that shares a border with Attakar, measures each one''s
    local building-density distribution, and ranks them by how closely that distribution
    overlaps Attakar''s - filling each candidate''s boundary on the map in its own
    colour so she can see which ward is which.

    The tightest match, Zankan, was the programme''s ward last cycle — not a clean,
    un-treated control — so Maya skips it for Gura, the next-closest neighbour the
    programme never touched. One click of "Add boundary" on Gura''s row adds it as
    the control arm; both wards now sit in one plan, each carrying its arm.

    She sets the sampling methodology — size-balanced PSU bands and a building-footprint-size
    filter — and clicks Generate plan. In one action the editor draws the sample for
    both arms and creates the plan.

    From the program workspace Maya can then send the plan to an existing locally
    led organization to verify if they are already under contact, or create a new
    solicitation from the plan for local organizations in the Connect network to apply
    to.'
