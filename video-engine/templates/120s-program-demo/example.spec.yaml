  script: |
    In rural Nigeria, the nearest clinic can be hours away — and for many mothers, the visit that matters never happens.
    Coverage gaps are stark: barely a third of mothers complete four antenatal visits, and millions deliver each year with no skilled care nearby. The result is one of the world's highest maternal mortality ratios.
    Connect runs the program as one loop — frontline workers learn, deliver guided visits, get verified, and are paid for results.
    A new worker starts in the Learn app. Animated modules and an AI coach walk her through antenatal counseling, danger signs, and referral steps, with personalized feedback until she's ready and passes the certification test.
    She passes the assessment, and the Deliver app unlocks. She's now eligible to work.
    On each home visit the Deliver app guides her step by step — capturing mother and pregnancy details, danger-sign checks, and an ANC card photo. Every field is structured, and every visit is recorded at the point of care, the moment it happens.
    Her visit is verified and approved, and the payment lands on her phone within minutes — funds following the work.
    But how do you know the visit really happened, the way it was supposed to?
    On the Network Manager platform, every delivery runs through verification rules. Here a payment was rejected automatically because the GPS point fell outside the assigned area — the rule fires before any money moves.
    Image audit pulls every ANC card side by side for bulk review. Reviewers score against objective criteria — is the card legible, the right form, filled for this mother — approving or flagging in seconds.
    The GPS table maps where each visit was recorded. One worker's points cluster suspiciously at a single address — drilling into the flagged case shows ten visits logged from the same spot in an hour.
    Flagged workers move to probation, with a chance to relearn and recover. Repeat issues trigger deactivation. The performance bar — visit volume and follow-up rate — keeps the strongest workers active and improving over time.
    For the program manager, the Audit-of-Audits dashboard rolls it all up — verification pass rates, task volume, and reviewer consistency. The longitudinal view tracks dropoff rate month over month, so quality is visible as a trend, not a guess.
    Back where we started, the visit now reaches the mother. Connect: verify delivery, pay for results, and turn the last mile into something you can finally see.

