    set_scene: "In rural Nigeria, the nearest clinic can be hours away — and for many mothers, the visit that matters never happens."
    problem: "Coverage gaps are stark: barely a third of mothers complete four antenatal visits, and millions deliver each year with no skilled care nearby. The result is one of the world's highest maternal mortality ratios."
    connect_overview: "Connect runs the program as one loop — frontline workers learn, deliver guided visits, get verified, and are paid for results."
    learn: "A new worker starts in the Learn app. Animated modules and an AI coach walk her through antenatal counseling, danger signs, and referral steps, with personalized feedback until she's ready and passes the certification test."
